name: Run Cricfy Feed Processor

on:
  schedule:
    - cron: '*/5 * * * *'   # Runs every 5 minutes
  workflow_dispatch:      # Allows manual trigger

permissions:
  contents: write

jobs:
  run-processor:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'

    - name: Install Dependencies
      run: |
        pip install -r requirements.txt

    - name: Run Decryption and Scraper
      run: |
        python fetch_and_decrypt.py

    - name: Commit and Push Decrypted Files
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add public_decrypted/
        git commit -m "chore: update cricfy decrypted feeds [skip ci]" || exit 0
        git push
